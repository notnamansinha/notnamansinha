name: README build
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Get Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py
      - name: Commit
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |-
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "notnamansinha/GitHub-Actions-Bot"
          git pull --rebase https://x-access-token:${ACCESS_TOKEN}@github.com/notnamansinha/notnamansinha.git main
          git add .
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push "https://x-access-token:${ACCESS_TOKEN}@github.com/notnamansinha/notnamansinha.git" HEAD:main

